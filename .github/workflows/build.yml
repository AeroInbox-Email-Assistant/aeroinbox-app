name: Build Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: aeroinbox-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  security-events: write
  pull-requests: write

jobs:
  detect-changes:
    name: Detect Repository Changes
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has-changes: ${{ steps.set-matrix.outputs.has-changes }}
      has-python-changes: ${{ steps.set-matrix.outputs.has-python-changes }}
      has-frontend-changes: ${{ steps.set-matrix.outputs.has-frontend-changes }}
      changed-services: ${{ steps.set-matrix.outputs.changed-services }}
      api-service-changed: ${{ steps.set-matrix.outputs.api-service-changed }}
      gmail-service-changed: ${{ steps.set-matrix.outputs.gmail-service-changed }}
      ai-service-changed: ${{ steps.set-matrix.outputs.ai-service-changed }}
      rule-engine-changed: ${{ steps.set-matrix.outputs.rule-engine-changed }}
      meeting-service-changed: ${{ steps.set-matrix.outputs.meeting-service-changed }}
      frontend-changed: ${{ steps.set-matrix.outputs.frontend-changed }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Filter Paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api-service:
              - 'services/api-service/**'
            gmail-service:
              - 'services/gmail-service/**'
            ai-service:
              - 'services/ai-service/**'
            rule-engine:
              - 'services/rule-engine/**'
            meeting-service:
              - 'services/meeting-service/**'
            frontend:
              - 'frontend/**'
            shared:
              - 'shared/**'
              - 'common/**'
              - 'libs/**'
              - '.github/workflows/**'

      - name: Generate Matrix and Outputs
        id: set-matrix
        run: |
          api_service="${{ steps.filter.outputs.api-service }}"
          gmail_service="${{ steps.filter.outputs.gmail-service }}"
          ai_service="${{ steps.filter.outputs.ai-service }}"
          rule_engine="${{ steps.filter.outputs.rule-engine }}"
          meeting_service="${{ steps.filter.outputs.meeting-service }}"
          frontend="${{ steps.filter.outputs.frontend }}"
          shared="${{ steps.filter.outputs.shared }}"
          event_name="${{ github.event_name }}"

          if [ "$shared" = "true" ] || [ "$event_name" = "workflow_dispatch" ]; then
            api_service="true"
            gmail_service="true"
            ai_service="true"
            rule_engine="true"
            meeting_service="true"
            frontend="true"
          fi

          MATRIX_ITEMS="[]"
          CHANGED_SERVICES=""

          add_item() {
            local service=$1
            local context=$2
            local dockerfile=$3
            local build_args=$4
            
            local item
            if [ -n "$build_args" ]; then
              item=$(jq -n \
                --arg svc "$service" \
                --arg ctx "$context" \
                --arg df "$dockerfile" \
                --arg ba "$build_args" \
                '{service: $svc, context: $ctx, dockerfile: $df, build_args: $ba}')
            else
              item=$(jq -n \
                --arg svc "$service" \
                --arg ctx "$context" \
                --arg df "$dockerfile" \
                '{service: $svc, context: $ctx, dockerfile: $df}')
            fi
            MATRIX_ITEMS=$(echo "$MATRIX_ITEMS" | jq ". + [$item]")
            
            if [ -z "$CHANGED_SERVICES" ]; then
              CHANGED_SERVICES="$service"
            else
              CHANGED_SERVICES="$CHANGED_SERVICES $service"
            fi
          }

          if [ "$api_service" = "true" ]; then
            add_item "api-service" "services/api-service" "services/api-service/Dockerfile" ""
          fi
          if [ "$gmail_service" = "true" ]; then
            add_item "gmail-service" "services/gmail-service" "services/gmail-service/Dockerfile" ""
          fi
          if [ "$ai_service" = "true" ]; then
            add_item "ai-service" "services/ai-service" "services/ai-service/Dockerfile" ""
          fi
          if [ "$rule_engine" = "true" ]; then
            add_item "rule-engine" "services/rule-engine" "services/rule-engine/Dockerfile" ""
          fi
          if [ "$meeting_service" = "true" ]; then
            add_item "meeting-service" "services/meeting-service" "services/meeting-service/Dockerfile" ""
          fi
          if [ "$frontend" = "true" ]; then
            add_item "frontend" "frontend" "frontend/Dockerfile" "VITE_API_URL=https://api.aeroinbox.qzz.io"
          fi

          echo "matrix=$(echo "$MATRIX_ITEMS" | jq -c .)" >> $GITHUB_OUTPUT
          echo "changed-services=$CHANGED_SERVICES" >> $GITHUB_OUTPUT

          LEN=$(echo "$MATRIX_ITEMS" | jq '. | length')
          if [ "$LEN" -gt 0 ]; then
            echo "has-changes=true" >> $GITHUB_OUTPUT
          else
            echo "has-changes=false" >> $GITHUB_OUTPUT
          fi

          if [ "$api_service" = "true" ] || [ "$gmail_service" = "true" ] || [ "$ai_service" = "true" ] || [ "$rule_engine" = "true" ] || [ "$meeting_service" = "true" ]; then
            echo "has-python-changes=true" >> $GITHUB_OUTPUT
          else
            echo "has-python-changes=false" >> $GITHUB_OUTPUT
          fi

          if [ "$frontend" = "true" ]; then
            echo "has-frontend-changes=true" >> $GITHUB_OUTPUT
          else
            echo "has-frontend-changes=false" >> $GITHUB_OUTPUT
          fi

          echo "api-service-changed=$api_service" >> $GITHUB_OUTPUT
          echo "gmail-service-changed=$gmail_service" >> $GITHUB_OUTPUT
          echo "ai-service-changed=$ai_service" >> $GITHUB_OUTPUT
          echo "rule-engine-changed=$rule_engine" >> $GITHUB_OUTPUT
          echo "meeting-service-changed=$meeting_service" >> $GITHUB_OUTPUT
          echo "frontend-changed=$frontend" >> $GITHUB_OUTPUT

  lint-and-test:
    name: Lint and Test Code
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has-changes == 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        if: needs.detect-changes.outputs.has-python-changes == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Linting and Testing Tools
        if: needs.detect-changes.outputs.has-python-changes == 'true'
        run: |
          pip install flake8 coverage

      - name: Lint Python Code (Syntax Checks)
        if: needs.detect-changes.outputs.has-python-changes == 'true'
        run: |
          flake8 services/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Install Dependencies for Testing
        if: needs.detect-changes.outputs.has-python-changes == 'true'
        run: |
          pip install -r services/meeting-service/requirements.txt

      - name: Run Python Unit Tests with Coverage
        if: needs.detect-changes.outputs.has-python-changes == 'true'
        env:
          PYTHONPATH: services/meeting-service
        run: |
          coverage run --source=services -m unittest services/meeting-service/verify_meeting_service.py
          coverage xml -o coverage.xml

      - name: Upload Python Coverage Report
        if: needs.detect-changes.outputs.has-python-changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage.xml

      - name: Setup Node.js
        if: needs.detect-changes.outputs.has-frontend-changes == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        if: needs.detect-changes.outputs.has-frontend-changes == 'true'
        working-directory: frontend
        run: |
          npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Lint Frontend Code
        if: needs.detect-changes.outputs.has-frontend-changes == 'true'
        working-directory: frontend
        run: |
          npm run lint

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [detect-changes, lint-and-test]
    if: needs.detect-changes.outputs.has-changes == 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Python Coverage Report
        if: needs.detect-changes.outputs.has-python-changes == 'true'
        uses: actions/download-artifact@v4
        with:
          name: python-coverage
          path: coverage-reports

      # Run the SonarCloud analysis and wait for the Quality Gate status
      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true

      - name: Setup Python for Snyk
        if: needs.detect-changes.outputs.has-python-changes == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies for Snyk Analysis
        if: needs.detect-changes.outputs.has-python-changes == 'true'
        run: |
          if [ "${{ needs.detect-changes.outputs.api-service-changed }}" = "true" ]; then pip install -r services/api-service/requirements.txt; fi
          if [ "${{ needs.detect-changes.outputs.gmail-service-changed }}" = "true" ]; then pip install -r services/gmail-service/requirements.txt; fi
          if [ "${{ needs.detect-changes.outputs.ai-service-changed }}" = "true" ]; then pip install -r services/ai-service/requirements.txt; fi
          if [ "${{ needs.detect-changes.outputs.rule-engine-changed }}" = "true" ]; then pip install -r services/rule-engine/requirements.txt; fi
          if [ "${{ needs.detect-changes.outputs.meeting-service-changed }}" = "true" ]; then pip install -r services/meeting-service/requirements.txt; fi

      - name: Setup Node.js for Snyk
        if: needs.detect-changes.outputs.frontend-changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies for Snyk Analysis
        if: needs.detect-changes.outputs.frontend-changed == 'true'
        working-directory: frontend
        run: |
          npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master

      - name: Snyk Scan - api-service
        if: needs.detect-changes.outputs.api-service-changed == 'true'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --file=services/api-service/requirements.txt --severity-threshold=high

      - name: Snyk Scan - gmail-service
        if: needs.detect-changes.outputs.gmail-service-changed == 'true'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --file=services/gmail-service/requirements.txt --severity-threshold=high

      - name: Snyk Scan - ai-service
        if: needs.detect-changes.outputs.ai-service-changed == 'true'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --file=services/ai-service/requirements.txt --severity-threshold=high

      - name: Snyk Scan - rule-engine
        if: needs.detect-changes.outputs.rule-engine-changed == 'true'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --file=services/rule-engine/requirements.txt --severity-threshold=high

      - name: Snyk Scan - meeting-service
        if: needs.detect-changes.outputs.meeting-service-changed == 'true'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --file=services/meeting-service/requirements.txt --severity-threshold=high

      - name: Snyk Scan - frontend
        if: needs.detect-changes.outputs.frontend-changed == 'true'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --file=frontend/package.json --severity-threshold=high

  build-and-push:
    name: Build and Push - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [detect-changes, security-scan]
    if: needs.detect-changes.outputs.has-changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (Local Load)
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          load: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/aeroinbox/${{ matrix.service }}:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/aeroinbox/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: ${{ matrix.build_args }}

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: '${{ secrets.ACR_LOGIN_SERVER }}/aeroinbox/${{ matrix.service }}:${{ github.sha }}'
          format: 'table'
          output: 'trivy-report-${{ matrix.service }}.txt'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ matrix.service }}
          path: trivy-report-${{ matrix.service }}.txt

      - name: Azure Login (OIDC)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: Push Docker Image to ACR
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/aeroinbox/${{ matrix.service }}:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/aeroinbox/${{ matrix.service }}:latest

  update-helm-tags:
    name: Update Helm Image Tags
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-push]
    if: |
      needs.detect-changes.outputs.has-changes == 'true' &&
      github.event_name == 'push' && 
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - name: Checkout Helm Repository
        uses: actions/checkout@v4
        with:
          repository: AeroInbox-Email-Assistant/aeroinbox-helm
          token: ${{ secrets.HELM_REPO_PAT }}

      - name: Update Service Tags in Values.yaml
        run: |
          changed_services="${{ needs.detect-changes.outputs.changed-services }}"
          
          # Determine values file dynamically based on branch
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            files=("environments/production/values.yaml")
          elif [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            files=("environments/dev/values.yaml")
          else
            files=("environments/production/values.yaml" "environments/dev/values.yaml")
          fi
          
          for file in "${files[@]}"; do
            mkdir -p "$(dirname "$file")"
            if [ ! -f "$file" ]; then
              echo "---" > "$file"
            fi
            for service in $changed_services; do
              yq -i ".[\"$service\"].image.tag = \"${{ github.sha }}\"" "$file"
            done
          done

      - name: Commit and Push Tag Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add environments/production/values.yaml environments/dev/values.yaml
          if ! git diff --cached --quiet; then
            git commit -m "ci: update image tags to ${{ github.sha }}"
            git push origin main
          else
            echo "No changes to commit"
          fi

  scan-summary:
    name: PR Scan Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, lint-and-test, security-scan, build-and-push]
    if: always() && github.event_name == 'pull_request' && needs.detect-changes.outputs.has-changes == 'true'
    steps:
      - name: Comment PR with results
        uses: actions/github-script@v7
        with:
          script: |
            const lintAndTest = '${{ needs.lint-and-test.result }}';
            const securityScan = '${{ needs.security-scan.result }}';
            const buildAndPush = '${{ needs.build-and-push.result }}';
            
            const status = (r) => r === 'success' ? '✅ PASSED' : (r === 'skipped' ? '⏭️ SKIPPED' : '❌ FAILED');
            const allPassed = (lintAndTest === 'success' || lintAndTest === 'skipped') &&
                              (securityScan === 'success' || securityScan === 'skipped') &&
                              (buildAndPush === 'success' || buildAndPush === 'skipped');
                              
            const body = [
              '## AeroInbox CI Scan Results',
              '',
              '| Check | Status |',
              '|-------|--------|',
              `| Lint & Test Suite | ${status(lintAndTest)} |`,
              `| Security Scan (SonarCloud + Snyk) | ${status(securityScan)} |`,
              `| Container Build & Trivy Scan | ${status(buildAndPush)} |`,
              '',
              allPassed
                ? '🎉 All checks passed. Safe to merge.'
                : '⚠️ One or more checks failed or have warnings. Please review the logs.'
            ].join('\n');
            
            if (!context.issue.number) {
              console.log('No issue/PR number found. Skipping comment creation.');
              return;
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  send-email-notification:
    name: Send Email Notification on Success
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-push]
    if: |
      needs.detect-changes.outputs.has-changes == 'true' &&
      success()
    steps:
      - name: Send success email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🎉 AeroInbox CI/CD Pipeline Success - Build #${{ github.run_number }}"
          to: ${{ secrets.MAIL_TO }}
          from: "AeroInbox CI/CD <${{ secrets.MAIL_USERNAME }}>"
          body: |
            AeroInbox CI/CD Pipeline built successfully!
            
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Committer: ${{ github.actor }}
            Run Number: #${{ github.run_number }}
            
            View pipeline logs and details here:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
