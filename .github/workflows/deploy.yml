name: Deploy Pipeline

on:
  workflow_run:
    workflows: ["Build Pipeline"]
    types: [completed]
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target deployment environment'
        type: choice
        options:
          - production
          - dev
        default: 'production'
        required: true
      image_tag:
        description: 'Docker image tag to deploy (defaults to git commit sha)'
        type: string
        required: false

permissions:
  id-token: write
  contents: read

env:
  DEPLOY_ENV: ${{ github.event.workflow_run && (github.event.workflow_run.head_branch == 'main' && 'production' || 'dev') || github.event.inputs.environment }}
  IMAGE_TAG: ${{ github.event.workflow_run && github.event.workflow_run.head_sha || github.event.inputs.image_tag || github.sha }}

jobs:
  deploy-and-verify:
    name: Deploy & Verify Rollout
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run == null || github.event.workflow_run.conclusion == 'success' }}
    environment: ${{ github.event.workflow_run && (github.event.workflow_run.head_branch == 'main' && 'production' || 'dev') || inputs.environment || 'production' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Checkout Helm repository using PAT to update values
      - name: Checkout Helm Repository
        uses: actions/checkout@v4
        with:
          repository: AeroInbox-Email-Assistant/aeroinbox-helm
          token: ${{ secrets.HELM_REPO_PAT }}
          path: aeroinbox-helm

      # 2. Update the Helm image tag for stateless services
      - name: Update Service Tags in Helm
        run: |
          cd aeroinbox-helm
          
          if [ "${{ env.DEPLOY_ENV }}" = "production" ]; then
            file="environments/production/values.yaml"
          else
            file="environments/dev/values.yaml"
          fi
          
          services=("api-service" "gmail-service" "ai-service" "rule-engine" "meeting-service" "frontend")
          
          mkdir -p "$(dirname "$file")"
          if [ ! -f "$file" ]; then
            echo "---" > "$file"
          fi
          
          for service in "${services[@]}"; do
            yq -i ".[\"$service\"].image.tag = \"${{ env.IMAGE_TAG }}\"" "$file"
          done

      # 3. Commit and push the tags to trigger ArgoCD Sync
      - name: Commit and Push Tag Changes
        run: |
          cd aeroinbox-helm
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ "${{ env.DEPLOY_ENV }}" = "production" ]; then
            file="environments/production/values.yaml"
          else
            file="environments/dev/values.yaml"
          fi
          
          git add "$file"
          if ! git diff --cached --quiet; then
            git commit -m "ci: deploy image tags ${{ env.IMAGE_TAG }} to ${{ env.DEPLOY_ENV }}"
            git push origin main
          else
            echo "No tag changes to commit."
          fi

      # 4. Run External Smoke Tests via Application Gateway
      - name: Run Deploy Smoke Tests
        run: |
          echo "Notice: AKS is a private cluster. Internal rollout status checks (kubectl) cannot be executed."
          echo "Performing external smoke tests via Application Gateway Public IP (70.153.121.19)..."
          
          echo "Waiting 45 seconds for ArgoCD to detect tag updates and start the rollout..."
          sleep 45
          
          success_api=false
          success_fe=false
          
          # Poll the public endpoints for up to 3 minutes (18 attempts * 10 seconds)
          for i in {1..18}; do
            echo "Attempt $i: Querying external endpoints..."
            
            if [ "$success_api" = "false" ]; then
              if curl -s -f -o /dev/null -H "Host: api.aeroinbox.qzz.io" --connect-timeout 5 http://70.153.121.19/healthz; then
                echo "✅ API Service is responsive and healthy!"
                success_api=true
              fi
            fi
            
            if [ "$success_fe" = "false" ]; then
              if curl -s -f -o /dev/null -H "Host: aeroinbox.qzz.io" --connect-timeout 5 http://70.153.121.19/healthz; then
                echo "✅ Frontend is responsive and healthy!"
                success_fe=true
              fi
            fi
            
            if [ "$success_api" = "true" ] && [ "$success_fe" = "true" ]; then
              echo "🎉 All services are verified healthy externally!"
              break
            fi
            
            sleep 10
          done
          
          if [ "$success_api" = "false" ] || [ "$success_fe" = "false" ]; then
            echo "❌ Smoke tests failed. One or more services did not become healthy within 3 minutes."
            exit 1
          fi

      # 5. Send success email notification
      - name: Send Success Email Notification
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🚀 AeroInbox CD Deployment Success - Run #${{ github.run_number }}"
          to: ${{ secrets.MAIL_TO }}
          from: "AeroInbox CD <${{ secrets.MAIL_USERNAME }}>"
          body: |
            AeroInbox CD Deployment completed successfully!
            
            Environment: ${{ env.DEPLOY_ENV }}
            Image Tag: ${{ env.IMAGE_TAG }}
            Triggered by Build run: ${{ github.event.workflow_run.html_url || 'Manual run' }}
            
            Rollout verified for all microservices. Smoke tests passed successfully!

      # 6. Send failure email notification
      - name: Send Failure Email Notification
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ AeroInbox CD Deployment Failed - Run #${{ github.run_number }}"
          to: ${{ secrets.MAIL_TO }}
          from: "AeroInbox CD <${{ secrets.MAIL_USERNAME }}>"
          body: |
            AeroInbox CD Deployment failed during rollout or verification.
            
            Environment: ${{ env.DEPLOY_ENV }}
            Image Tag: ${{ env.IMAGE_TAG }}
            
            Please review the CD pipeline logs here:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
